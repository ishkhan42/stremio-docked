# Stremio server upstream (internal)
upstream stremio_server {
    server 127.0.0.1:11470;
    keepalive 32;
}

# Custom backend upstream
upstream backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    # Buffer tuning for video streaming
    proxy_buffer_size          128k;
    proxy_buffers              16 256k;
    proxy_busy_buffers_size    512k;

    # ── Static UI ──────────────────────────────────────────────────────────
    root /srv/ui/dist;
    index index.html;

    location / {
        # SPA fallback: all non-file routes serve index.html
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|woff2|woff|ttf|png|jpg|webp|svg|ico)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Custom API backend ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── stremio-server: video stream & HLS segments ──────────────────────
    # Prefixed under /ss/ to avoid path conflicts
    location /ss/ {
        rewrite ^/ss/(.*)$ /$1 break;

        proxy_pass http://stremio_server;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host 127.0.0.1:11470;

        # Streaming-optimised: no buffering, long timeout
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Allow range requests for seeking
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        add_header Accept-Ranges bytes;
    }

    # ── WebSocket support for stremio local-addon ─────────────────────────
    location /ss/local-addon {
        rewrite ^/ss/(.*)$ /$1 break;
        proxy_pass http://stremio_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
